<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹소설 스타일 캡처 생성기</title>
  <!-- 고화질 이미지 저장을 위한 라이브러리 로드 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    /* 기본 레이아웃 변수 설정 (라이트/다크 모드대응) */
    :root {
      --bg-control: #f8f9fa;
      --text-control: #333;
      --border-color: #ced4da;
      
      /* 캡처 본문 스타일 (기본 다크모드) */
      --novel-bg: #000000;
      --novel-text: #ffffff;         /* 수정사항: 기본 글자색을 흐린 회색에서 순수 화이트로 변경하여 선명도 100% 확보 */
      --novel-bold: #ffffff;         /* 볼드체와 동일한 화이트로 통일 */
      --novel-highlight-bg: rgba(255, 204, 0, 0.25); 
      --novel-highlight-text: #ffcc00;               
      --novel-code-bg: rgba(255, 255, 255, 0.12); 
    }

    [data-theme="light"] {
      --novel-bg: #ffffff;
      --novel-text: #000000;         /* 수정사항: 라이트모드 기본 글자색도 흐린 먹색에서 완전한 블랙으로 변경 */
      --novel-bold: #000000;
      --novel-highlight-bg: #fff3bf; 
      --novel-highlight-text: #000000; 
      --novel-code-bg: rgba(0, 0, 0, 0.06); 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; 
      display: flex; 
      height: 100vh; 
      background: #e9ecef; 
    }

    /* 컨트롤 패널 스타일 (좌측) */
    .control-panel { width: 400px; padding: 20px; background: var(--bg-control); color: var(--text-control); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
    h2 { font-size: 18px; margin-bottom: 5px; }
    label { font-size: 13px; font-weight: bold; display: block; }
    textarea, input[type="text"] { width: 100%; border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; font-size: 14px; resize: none; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
    .btn-primary { background: #007bff; color: white; }
    .btn-primary:hover { background: #0056b3; }
    .btn-success { background: #28a745; color: white; margin-top: auto; }
    .btn-success:hover { background: #218838; }
    .flex-row { display: flex; gap: 10px; align-items: center; }
    .guide-box { background: #e2e3e5; padding: 10px; border-radius: 4px; font-size: 12px; line-height: 1.5; color: #383d41; }

    /* 프리뷰 영역 스타일 (우측) */
    .preview-container { flex: 1; display: flex; justify-content: center; align-items: start; padding: 4px; overflow-y: auto; background: #555; position: relative; }
    
    /* 실제 웹소설 캡처 구역 */
    .novel-capture-area {
      width: 500px;
      min-height: 700px;
      background-color: var(--novel-bg);
      padding: 40px; 
      color: var(--novel-text);
      font-size: 17px;
      line-height: 1.85; 
      letter-spacing: -0.02em;
      text-align: left; 
    }

    /* 단어 중간 끊김 방지 및 여백 통일 */
    .novel-capture-area p, .novel-capture-area blockquote, .novel-capture-area pre {
      word-break: keep-all;
      overflow-wrap: break-word;
      margin-bottom: 0; 
      opacity: 1 !important;        /* 수정사항: *로 감싸이지 않은 모든 일반 문장, 대사 등은 강제로 불투명도 100% 고정 */
      color: var(--novel-text);
    }

    /* 마크다운 규칙 스타일 정의 */
    .novel-capture-area strong { 
      color: var(--novel-bold); 
      font-weight: 700; 
      opacity: 1 !important;
    }
    
    /* 수정사항: *텍스트* 기호 내부의 투명도가 너무 높아 안 보였던 점을 개선 (0.45 -> 0.65로 상향 조정) */
    .novel-capture-area .low-opacity { 
      opacity: 0.65 !important; 
    }
    
    /* 인용구 스타일 정의 (이탤릭체 및 투명도 절대 금지) */
    .novel-capture-area blockquote { 
      border-left: 4px solid var(--novel-text); 
      padding-left: 15px; 
      font-style: normal !important; /* 정자체 유지 */
    }
    
    /* 멀티라인 코드블록 서식 */
    .novel-capture-area pre {
      background-color: var(--novel-code-bg);
      padding: 10px 15px;
      border-radius: 6px;
      white-space: pre-wrap; 
      font-family: monospace;
    }
    .novel-capture-area code { 
      font-family: monospace; 
      background: rgba(128,128,128,0.2); 
      padding: 2px 6px; 
      border-radius: 4px; 
      font-size: 0.9em; 
    }
    .novel-capture-area pre code {
      background: none;
      padding: 0;
      font-size: 0.9em;
    }
    
    /* 하이라이트 스타일 */
    .novel-capture-area .highlight { 
      background-color: var(--novel-highlight-bg) !important;
      color: var(--novel-highlight-text) !important; 
      font-weight: bold; 
      padding: 2px 4px;
      border-radius: 4px;
      cursor: pointer; 
      transition: opacity 0.15s;
    }
    
    /* 빈 줄 유지 */
    .novel-capture-area .empty-line { height: 1.85em; margin-bottom: 0; }
  </style>
</head>
<body>

  <!-- 좌측 컨트롤 패널 -->
  <div class="control-panel">
    <h2>소설 캡처 설정</h2>
    
    <div>
      <label style="margin-bottom: 5px;">테마 선택</label>
      <div class="flex-row">
        <button class="btn btn-primary" onclick="setTheme('dark')">다크 모드</button>
        <button class="btn btn-primary" style="background:#6c757d;" onclick="setTheme('light')">라이트 모드</button>
      </div>
    </div>

    <div>
      <label style="margin-bottom: 5px;">텍스트 파일 가져오기 (.txt / .json)</label>
      <input type="file" id="fileInput" accept=".txt,.json" onchange="handleFileUpload()">
    </div>

    <div>
      <label style="margin-bottom: 5px;">단어 치환 (형식: 원본->바꿀단어)</label>
      <textarea id="replaceRules" style="height: 60px;" placeholder="예시)&#10;이름->■■&#10;카에데->○○"></textarea>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column;">
      <div class="flex-row" style="justify-content: space-between; margin-bottom: 5px; align-items: center;">
        <label>소설 본문 입력</label>
        <button class="btn" style="width: auto; padding: 4px 10px; font-size: 11px; background: #dc3545; color: white;" onclick="clearAllHighlights()">하이라이트 전체 삭제</button>
      </div>
      
      <div class="guide-box" style="margin-bottom: 8px;">
        • <b>**텍스트**</b> : 강조 타이틀 (볼드)<br>
        • <b>*텍스트*</b> : 차분하게 톤 다운된 서체 (가독성 개선)<br>
        • <b>==텍스트==</b> : 형광펜 강조 (드래그 추가 / 클릭 삭제)<br>
        • <b>&gt; 텍스트</b> : 인용구 레이아웃 (정자체 100% 선명)<br>
        • <b>```멀티라인 코드```</b> : 코드블록 레이아웃
      </div>
      <textarea id="inputText" style="flex: 1;" placeholder="여기에 소설 텍스트를 입력하거나 파일을 업로드하세요..." oninput="renderNovel()"></textarea>
    </div>

    <button class="btn btn-success" onclick="downloadPNG()">고화질 PNG 다운로드</button>
  </div>

  <!-- 우측 실시간 프리뷰 영역 -->
  <div class="preview-container">
    <div class="novel-capture-area" id="novelView" data-theme="dark"></div>
  </div>

  <button id="floatingHighlightBtn" style="position: absolute; display: none; background: #28a745; color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 9999;">✍️ 하이라이트 추가</button>

  <script>
    window.onload = function() {
      document.getElementById('replaceRules').value = "이름->■■";
      // 보내주신 실제 예시 데이터 반영
      document.getElementById('inputText').value = `\`\`\`\n[ #39〡🌸2031년 04월 14일 월요일〡11:05〡황궁 동궁전 황태자 집무실〡⚪ ]\n―\n황태자 집무실｜이휘, 한재연｜재연의 떨리는 확인 질문에 이휘가 답하는 순간\n이휘｜진심이냐고 묻는 네가 더 웃겨\n\`\`\`\n\n*찻잔 위로 피어오르는 수증기가 재연의 떨리는 손끝을 감싸 안았다가 흩어졌다. 커피가 아닌 다즐링이었다. 재연이 긴장하면 카페인보다 홍차를 선호한다는 사실을 이휘가 기억하고 있다는 증거가 찻잔 속 호박빛 액체에 고스란히 담겨 있었으나, 지금 재연의 시선은 차가 아닌 맞은편에 앉은 남자의 얼굴에 꽂혀 있었다. 이휘는 소파 등받이에 한쪽 팔을 걸친 채 다리를 느슨하게 꼬고 앉아 있었고, 재연의 질문이 공기 중에 떨리며 매달려 있는 동안 아무런 대답도 하지 않은 채 그녀의 눈을 들여다보고 있었다. 집무실 창밖으로 벚꽃 한 잎이 유리창에 부딪혀 살짝 미끄러지는 소리가 날 만큼의 긴 침묵이 흘렀고, 그 침묵 안에서 재연의 심장이 미친 듯이 뛰고 있다는 사실을 이휘는 그녀의 목 옆 맥박으로 읽고 있었다.*\n\n> 이휘가 천천히 몸을 앞으로 기울였다. 소파 쿠션이 그의 무게에 짓눌리며 가죽 특유의 부드운 마찰음을 냈고, 테이블 위로 뻗은 그의 손이 재연의 찻잔을 감싸 쥔 떨리는 손 위에 가만히 포개졌다. 체온이 찻잔의 온기와 섞여 재연의 손가락 마디마디를 감싸는 감각이 퍼져나갔고, 이휘의 큰 손바닥은 재연의 양 손을 완전히 덮을 만큼 넉넉했다. 그 손이 아주 미세한 힘으로 한 번 쥐어졌다가 풀렸다. 괜찮다는 뜻인지, 진정하라는 뜻인지, 혹은 그 둘 다인지.\n\n**이휘｜** "한재연."`;
      renderNovel();
    };

    function setTheme(theme) {
      const novelView = document.getElementById('novelView');
      novelView.setAttribute('data-theme', theme);
    }

    function handleFileUpload() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const contents = e.target.result;
        if (file.name.endsWith('.json')) {
          try {
            const jsonObj = JSON.parse(contents);
            document.getElementById('inputText').value = jsonObj.content || jsonObj.text || JSON.stringify(jsonObj, null, 2);
          } catch (err) {
            alert('올바른 JSON 형식이 아닙니다.');
          }
        } else {
          document.getElementById('inputText').value = contents;
        }
        renderNovel();
      };
      reader.readAsText(file, 'UTF-8');
    }

    function renderNovel() {
      let rawText = document.getElementById('inputText').value;
      const replaceRules = document.getElementById('replaceRules').value;
      const novelView = document.getElementById('novelView');

      const rules = replaceRules.split('\n');
      rules.forEach(rule => {
        if (rule.includes('->')) {
          const [target, replacement] = rule.split('->');
          if (target.trim()) {
            const safeTarget = target.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'); 
            const regex = new RegExp(safeTarget, 'g');
            rawText = rawText.replace(regex, replacement);
          }
        }
      });

      const lines = rawText.split('\n');
      let resultHtml = '';
      let inCodeBlock = false;

      lines.forEach(line => {
        if (line.trim().startsWith('```')) {
          if (line.trim().endsWith('```') && line.trim().length > 6) {
            let codeContent = line.trim().slice(3, -3);
            let processedCode = codeContent.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            resultHtml += `<p><code>${processedCode}</code></p>`;
            return;
          }
          if (!inCodeBlock) {
            inCodeBlock = true;
            resultHtml += '<pre><code>';
          } else {
            inCodeBlock = false;
            resultHtml += '</code></pre>';
          }
          return;
        }

        if (inCodeBlock) {
          let processedCode = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
          resultHtml += processedCode + '\n';
          return;
        }

        let isBlockquote = false;
        let currentLine = line;
        if (currentLine.trim().startsWith('>')) {
          isBlockquote = true;
          currentLine = currentLine.replace(/^\s*>\s?/, ''); 
        }

        let processedLine = currentLine.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        processedLine = processedLine.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        processedLine = processedLine.replace(/\*(.*?)\*/g, '<span class="low-opacity">$1</span>');
        processedLine = processedLine.replace(/==(.*?)==/g, '<span class="highlight">$1</span>');
        processedLine = processedLine.replace(/```(.*?)```/g, '<code>$1</code>');

        if (isBlockquote) {
          resultHtml += `<blockquote>${processedLine}</blockquote>`;
        } else if (line.trim() === '') {
          resultHtml += `<p class="empty-line">&nbsp;</p>`; 
        } else {
          resultHtml += `<p>${processedLine}</p>`;
        }
      });

      novelView.innerHTML = resultHtml;
    }

    function downloadPNG() {
      const novelView = document.getElementById('novelView');
      renderNovel();

      html2canvas(novelView, {
        scale: 3, 
        useCORS: true,
        backgroundColor: null 
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = '웹소설_캡처_' + new Date().getTime() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(err => {
        alert('이미지 생성 중 오류가 발생했습니다: ' + err);
      });
    }
    
    document.getElementById('replaceRules').addEventListener('input', renderNovel);

    // 드래그 하이라이트 로직
    const floatBtn = document.getElementById('floatingHighlightBtn');

    novelView.addEventListener('mouseup', function(e) {
      setTimeout(() => {
        const selection = window.getSelection();
        const selectedText = selection.toString().trim();

        if (selectedText.length > 0) {
          const range = selection.getRangeAt(0);
          const rect = range.getBoundingClientRect();

          floatBtn.style.left = `${rect.left + window.pageXOffset + (rect.width / 2) - 60}px`;
          floatBtn.style.top = `${rect.top + window.pageYOffset - 40}px`;
          floatBtn.style.display = 'block';
          floatBtn.dataset.text = selectedText;
        }
      }, 10);
    });

    document.addEventListener('mousedown', function(e) {
      if (e.target !== floatBtn) {
        floatBtn.style.display = 'none';
      }
    });

    floatBtn.addEventListener('click', function() {
      const targetText = this.dataset.text;
      if (!targetText) return;

      const textarea = document.getElementById('inputText');
      let currentContent = textarea.value;

      if (currentContent.includes(targetText)) {
        textarea.value = currentContent.replace(targetText, `==${targetText}==`);
        renderNovel(); 
      } else {
        alert("텍스트 원본과 일치하는 구간을 찾지 못했습니다.\n줄바꿈(엔터)이 여러 개 포함되었는지 확인해 주세요.");
      }

      floatBtn.style.display = 'none';
      window.getSelection().removeAllRanges();
    });

    // 하이라이트 클릭 삭제 로직
    novelView.addEventListener('click', function(e) {
      if (e.target.classList.contains('highlight')) {
        if (window.getSelection().toString().trim().length > 0) return;

        const highlights = Array.from(novelView.querySelectorAll('.highlight'));
        const targetIndex = highlights.indexOf(e.target);

        const textarea = document.getElementById('inputText');
        let content = textarea.value;

        let currentMatchIdx = 0;
        textarea.value = content.replace(/==(.*?)==/g, function(match, p1) {
          if (currentMatchIdx === targetIndex) {
            currentMatchIdx++;
            return p1; 
          }
          currentMatchIdx++;
          return match; 
        });

        renderNovel(); 
      }
    });

    function clearAllHighlights() {
      const textarea = document.getElementById('inputText');
      let content = textarea.value;
      
      textarea.value = content.replace(/==(.*?)==/g, '$1');
      renderNovel();
    }
  </script>
</body>
</html>
